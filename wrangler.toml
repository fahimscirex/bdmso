name = "bdmso"
main = "worker/index.js"
compatibility_date = "2026-04-21"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"
html_handling = "none"
run_worker_first = true

# bKash credentials - set via secrets before going live:
#   wrangler secret put BKASH_APP_KEY
#   wrangler secret put BKASH_APP_SECRET
#   wrangler secret put BKASH_USERNAME
#   wrangler secret put BKASH_PASSWORD
[vars]
BKASH_SANDBOX = "true"

[[d1_databases]]
binding = "DB"
database_name = "bdmso"
database_id = "86bd0e2c-7ae3-4d41-a83e-cea098727326"
preview_database_id = "86bd0e2c-7ae3-4d41-a83e-cea098727326"

# R2 bucket for dashboard image uploads (post covers, program banners, etc.)
# Create the bucket once:
#   wrangler r2 bucket create bdmso-assets
[[r2_buckets]]
binding = "ASSETS_R2"
bucket_name = "bdmso-assets"
preview_bucket_name = "bdmso-assets"
