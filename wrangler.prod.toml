name = "bdmso"
main = "worker/index.js"
compatibility_date = "2026-04-21"

[assets]
directory = "./dist"
binding = "ASSETS"

# Production secrets - set these before the first deploy:
#   wrangler secret put BKASH_APP_KEY    --config wrangler.prod.toml
#   wrangler secret put BKASH_APP_SECRET --config wrangler.prod.toml
#   wrangler secret put BKASH_USERNAME   --config wrangler.prod.toml
#   wrangler secret put BKASH_PASSWORD   --config wrangler.prod.toml
#   wrangler secret put BREVO_API_KEY    --config wrangler.prod.toml
#   wrangler secret put EMAIL_FROM       --config wrangler.prod.toml
# NOTE: do NOT add a [vars] block for credentials. Secrets keep values out of the config file and deploy logs.

[[d1_databases]]
binding = "DB"
database_name = "bdmso"
database_id = "86bd0e2c-7ae3-4d41-a83e-cea098727326"
preview_database_id = "86bd0e2c-7ae3-4d41-a83e-cea098727326"
