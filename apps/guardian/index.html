<!DOCTYPE html>
<!-- lang en-GB so any native <input type="date"> renders dd/mm/yyyy, never US mm/dd/yyyy. -->
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,follow" />
    <title>Dashboard - BdMSO</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- Marketing-site fonts + base stylesheet. Loaded BEFORE the SPA
         bundle so the header/footer rendered by /js/site.js look right
         out of the gate, and so our dashboard-specific styles (loaded
         after) can override where they need to. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
