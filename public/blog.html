.wrap { margin-top: -56px; position: relative; z-index: 2; padding-bottom: 96px; }

.cats { display: flex; gap: 6px; padding: 10px; background: white; border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow-sm); margin-bottom: 28px; overflow-x: auto; max-width: 100%; }
.cats button { padding: 9px 16px; font-weight: 600; font-size: 14px; color: var(--ink-2); border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.cats button.active { background: var(--navy-900); color: white; }

}

.feature h2 { font-size: 1.8rem; line-height: 1.15; }
.feature p { color: var(--ink-2); font-size: 14.5px; line-height: 1.6; margin: 0; }
.feature .read { font-size: 13px; font-weight: 600; color: var(--navy-800); }
@media (max-width: 900px) { .feature { grid-template-columns: 1fr; } .feature .body { padding: 28px; } }

.posts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

@media (max-width: 560px) { .posts { grid-template-columns: 1fr; } }
.post {
  background: white; border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden;

.post .body { padding: 22px; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
.post .meta { display: flex; gap: 10px; font-size: 12px; color: var(--ink-3); }
.post .cat { font-weight: 700; color: var(--navy-700); text-transform: uppercase; letter-spacing: 0.1em; }

.post p { font-size: 13.5px; color: var(--ink-3); margin: 0; }

.posts-loading { text-align: center; padding: 48px; color: var(--ink-3); }

<body data-page="blog">
<div id="site-header"></div>
<main>
<section class="page-head"><div class="container">
  <span class="eyebrow">News &amp; Announcements</span>
  <h1>What's happening at BdMSO.</h1>
  <p>Deadlines, venues, press releases, and camp updates - straight from the BdMSO editorial desk.</p>
</div></section>

<section class="container wrap">
  <div class="cats" id="cats-bar">
    <button class="active" data-cat="all">All</button>
  </div>

  <div id="feature-post"></div>
  <div class="posts" id="posts-grid"><div class="posts-loading">Loading posts…</div></div>
</section>
</main>
<div id="site-footer"></div>
<script src="/js/site.js"></script>
<script>
(async () => {
  const res = await fetch('posts/index.json').catch(() => null);
  if (!res || !res.ok) {
    document.getElementById('posts-grid').innerHTML = '<p style="color:var(--ink-3);padding:32px;">Could not load posts.</p>';
    return;
  }
  const posts = await res.json();

  function escHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Build category filter buttons
  const cats = ['all', ...new Set(posts.map(p => p.category))];
  const catsBar = document.getElementById('cats-bar');
  catsBar.innerHTML = cats.map(c =>
    `<button data-cat="${escHtml(c)}" class="${c === 'all' ? 'active' : ''}">${c === 'all' ? 'All' : escHtml(c)}</button>`
  ).join('');
  catsBar.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    catsBar.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.cat);
  });

  function postUrl(p) {
    return `/posts/${p.slug}`;
  }

  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function featureCard(p) {
    return `<a class="feature" href="${postUrl(p)}">
      <div class="cover">${p.image
        ? `<img loading="lazy" src="${escHtml(p.image)}" alt="${escHtml(p.title)}">`
        : `<div class="ph">[cover]</div>`}
      </div>
      <div class="body">
        <div class="meta"><span class="cat">${escHtml(p.category)}</span><span>${escHtml(formatDate(p.date))}</span></div>
        <h2>${escHtml(p.title)}</h2>
        <p>${escHtml(p.excerpt)}</p>
        <span class="read">Read more →</span>
      </div>
    </a>`;
  }

  function postCard(p) {
    return `<a class="post" href="${postUrl(p)}">
      <div class="cover">${p.image
        ? `<img loading="lazy" src="${escHtml(p.image)}" alt="${escHtml(p.title)}">`
        : `<div class="ph">[${escHtml(p.category)}]</div>`}
      </div>
      <div class="body">
        <div class="meta"><span class="cat">${escHtml(p.category)}</span><span>${escHtml(formatDate(p.date))}</span></div>
        <h3>${escHtml(p.title)}</h3>
        <p>${escHtml(p.excerpt)}</p>
        <span class="read">Read →</span>
      </div>
    </a>`;
  }

  function render(activeCat) {
    const filtered = activeCat === 'all' ? posts : posts.filter(p => p.category === activeCat);
    const featured = filtered.find(p => p.featured);
    const rest = filtered.filter(p => !p.featured);

    document.getElementById('feature-post').innerHTML = featured ? featureCard(featured) : '';
    document.getElementById('posts-grid').innerHTML = rest.length
      ? rest.map(postCard).join('')
      : '<p style="color:var(--ink-3);padding:32px 0;">No posts in this category yet.</p>';
  }

  render('all');
})();
</script>
</body>
