<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,follow">
<base href="/">
<title>Blog - BdMSO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="/css/styles.css" />
<style>
.post-hero {
  background: linear-gradient(180deg, var(--navy-900) 0%, var(--navy-page-dark) 100%);
  position: relative; overflow: hidden; padding: 72px 0 0;
}
.post-hero::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(600px 280px at 50% 100%, var(--glow-gold-sm), transparent 60%);
}
.post-hero .container { position: relative; z-index: 1; text-align: center; display: flex; flex-direction: column; align-items: center; }
.post-meta-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.post-meta-bar .sep { display: none; }
@media (min-width: 540px) { .post-meta-bar .sep { display: inline; } }
.post-meta-bar .eyebrow { margin: 0; }
.post-meta-bar .sep { color: rgba(255,255,255,0.25); }
.post-meta-bar .date, .post-meta-bar .author { font-size: 13px; color: rgba(255,255,255,0.55); }
.post-title { color: white; font-size: clamp(1.8rem, 4vw, 2.8rem); line-height: 1.15; margin: 0 0 20px; max-width: 760px; }
.post-excerpt { color: rgba(255,255,255,0.65); font-size: 1.05rem; max-width: 640px; margin: 0 0 40px; }
.post-cover {
  width: 100%; max-width: 900px; margin: 0 auto;
  border-radius: var(--r-xl) var(--r-xl) 0 0; overflow: hidden;
  aspect-ratio: 16/7; position: relative;
}
.post-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.post-cover .ph { position: absolute; inset: 0; border-radius: 0; border: none; }

.post-body {
  max-width: 720px; margin: 0 auto; padding: 56px 24px 96px;
}
.post-body h2 { font-size: 1.45rem; margin: 2em 0 0.5em; color: var(--navy-900); }
.post-body h3 { font-size: 1.2rem; margin: 1.8em 0 0.4em; color: var(--navy-900); }
.post-body h4 { font-size: 1rem; margin: 1.6em 0 0.3em; color: var(--navy-900); }
.post-body p  { line-height: 1.8; color: var(--ink-1); margin: 0 0 1.2em; }
.post-body ul, .post-body ol { padding-left: 22px; margin: 0 0 1.2em; }
.post-body li { line-height: 1.7; color: var(--ink-1); margin-bottom: 4px; }
.post-body strong { color: var(--navy-900); }
.post-body a { color: var(--navy-700); text-decoration: underline; }
.post-body blockquote {
  border-left: 3px solid var(--navy-200); margin: 1.5em 0;
  padding: 12px 20px; background: var(--navy-50); border-radius: 0 var(--r) var(--r) 0;
}
.post-body blockquote p { margin: 0; color: var(--ink-2); font-style: italic; }
.post-body hr { border: none; border-top: 1px solid var(--line); margin: 2.5em 0; }
.post-body code { font-family: var(--font-mono); font-size: 0.88em; background: var(--navy-50); padding: 2px 6px; border-radius: 4px; }
.post-body figure { margin: 2em 0; }
.post-body figure img { width: 100%; border-radius: var(--r-lg); }
.post-body figure figcaption { font-size: 13px; color: var(--ink-3); text-align: center; margin-top: 8px; }

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6);
  margin-bottom: 28px; text-decoration: none; align-self: flex-start;
  transition: color 0.15s;
}
.back-link:hover { color: white; }
.back-link::before { content: "←"; }

@media (max-width: 539px) {
  .post-hero { padding: 40px 0 0; }
  .post-title { font-size: 1.55rem; margin-bottom: 24px; }
  .post-excerpt { display: none; }
  .post-meta-bar { gap: 6px; margin-bottom: 16px; }
  .post-meta-bar .author { display: none; }
  .post-meta-bar .sep:last-of-type { display: none; }
  .post-body { padding: 32px 20px 64px; }
}

.post-error { text-align: center; padding: 80px 24px; color: var(--ink-3); }
.post-error h2 { color: var(--navy-900); margin-bottom: 8px; }
</style>

<body data-page="blog">
<div id="site-header"></div>
<main>

<section class="post-hero" id="post-hero">
  <div class="container">
    <a class="back-link" href="/blog">Back to Blog</a>
    <div id="post-meta-bar" class="post-meta-bar"></div>
    <h1 class="post-title" id="post-title">Loading…</h1>
    <p class="post-excerpt" id="post-excerpt"></p>
  </div>
  <div class="post-cover" id="post-cover" style="display:none;">
    <div class="ph" id="post-cover-ph" style="display:none;">[cover]</div>
  </div>
</section>

<div class="post-body" id="post-body"></div>

</main>
<div id="site-footer"></div>
<script src="/js/site.js"></script>
<script type="module">
import { markdownToHtml, escHtml } from './js/md.js';

// Slug can come either from /posts/<slug> path or ?slug= query.
const pathMatch = location.pathname.match(/\/posts\/([^/]+?)(?:\.html)?$/);
const slug = pathMatch ? decodeURIComponent(pathMatch[1])
           : (new URLSearchParams(location.search).get('slug') || '');

function show(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function stripFrontmatter(raw) {
  const m = raw.match(/^---\r?\n[\s\S]*?\r?\n---\r?\n([\s\S]*)$/);
  return m ? m[1] : raw;
}

async function load() {
  if (!slug) return showError('No post specified.');

  // Metadata from index.json (single source of truth, generated at build time).
  let meta;
  try {
    const idx = await fetch('posts/index.json').then(r => r.ok ? r.json() : []);
    meta = idx.find(p => p.slug === slug);
    if (!meta) throw new Error('not in index');
  } catch {
    return showError('Post not found.');
  }

  // Body from the .md file.
  let body = '';
  try {
    const res = await fetch(`posts/${slug}.md`);
    if (res.ok) body = stripFrontmatter(await res.text());
  } catch { /* body stays empty */ }

  document.title = `${meta.title || 'Post'} - BdMSO`;

  const parts = [];
  if (meta.category) parts.push(`<span class="eyebrow">${escHtml(meta.category)}</span>`);
  if (meta.date)     parts.push(`<span class="sep">·</span><span class="date">${escHtml(formatDate(meta.date))}</span>`);
  if (meta.author)   parts.push(`<span class="sep">·</span><span class="author">${escHtml(meta.author)}</span>`);
  show('post-meta-bar', parts.join(' '));

  show('post-title', escHtml(meta.title || ''));
  show('post-excerpt', escHtml(meta.excerpt || ''));

  const coverEl = document.getElementById('post-cover');
  if (meta.image) {
    coverEl.style.display = '';
    coverEl.innerHTML = `<img loading="lazy" src="${escHtml(meta.image)}" alt="${escHtml(meta.title || '')}">`;
  }

  show('post-body', markdownToHtml(body));
}

function showError(msg) {
  document.getElementById('post-title').textContent = 'Post not found';
  document.getElementById('post-excerpt').textContent = '';
  show('post-body', `<div class="post-error"><h2>Oops.</h2><p>${msg}</p><a class="btn btn-ghost" href="/blog">← Back to Blog</a></div>`);
}

load();
</script>
</body>
</html>
